          <div class="post-content" v-pre>
            <p>天地玄宗，万炁（qì）本根。<br>
广修亿劫，证吾神通。<br>
三界内外，惟道独尊。<br>
体有金光，覆映吾身。<br>
视而不见，听之不闻。<br>
包罗天地，养育群生。<br>
受持万遍，身有光明。<br>
三界侍卫，五帝司迎。<br>
万神朝礼，役使雷霆。<br>
鬼妖丧胆，精怪亡形。<br>
内有霹雳，雷神隐名。<br>
洞慧交彻，五炁腾腾。<br>
金光速现，覆护真人。</p>
